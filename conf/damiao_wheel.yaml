# Motor and Leg Configuration
# This file defines the motor setup for all four legs of the robot

# Global parameters
global:
  zero_position: 1.5707963267948  # π/2 radians

# Motor definitions - each motor must have unique properties
motors:
  FL_M0:
    motor_type: DM8006      # Motor model
    slave_id: 0x01        # Slave CAN ID
    master_id: 0x11       # Master CAN ID
    
  FL_M1:
    motor_type: DM8006
    slave_id: 0x02
    master_id: 0x12
    
  FL_M2:
    motor_type: DM8006
    slave_id: 0x03
    master_id: 0x13
    
  FR_M0:
    motor_type: DM8006
    slave_id: 0x01
    master_id: 0x11
    
  FR_M1:
    motor_type: DM8006
    slave_id: 0x02
    master_id: 0x12
    
  FR_M2:
    motor_type: DM8006
    slave_id: 0x03
    master_id: 0x13
    
  BL_M0:
    motor_type: DM8006
    slave_id: 0x01
    master_id: 0x11
    
  BL_M1:
    motor_type: DM8006
    slave_id: 0x02
    master_id: 0x12
    
  BL_M2:
    motor_type: DM8006
    slave_id: 0x03
    master_id: 0x13
    
      
  BR_M0:
    motor_type: DM8006
    slave_id: 0x01
    master_id: 0x11
    
  BR_M1:
    motor_type: DM8006
    slave_id: 0x02
    master_id: 0x12
    
  BR_M2:
    motor_type: DM8006
    slave_id: 0x03
    master_id: 0x13
    
  
# Leg definitions
legs:
  FL:  # Front Left
    name: "Front Left"
    can_port: "can0"
    num_motors: 3
    motors: [FL_M0, FL_M1, FL_M2]
    directions: [1, 1, -1]
    zero_position_indices: 2  # Index of motors that use ZERO_POS as initial position
    zero_position_offset: -1    # Offset sign for ZERO_POS (subtract for FL/BL)
    
  FR:  # Front Right
    name: "Front Right"
    can_port: "can1"
    num_motors: 3
    motors: [FR_M0, FR_M1, FR_M2]
    directions: [1, -1, 1]
    zero_position_indices: 2
    zero_position_offset: 1     # Add ZERO_POS for FR/BR
    
  BL:  # Back Left
    name: "Back Left"
    can_port: "can2"
    num_motors: 3
    motors: [BL_M0, BL_M1, BL_M2]
    directions: [-1, 1, -1]
    zero_position_indices: 2
    zero_position_offset: -1
    
  BR:  # Back Right
    name: "Back Right"
    can_port: "can3"
    num_motors: 3
    motors: [BR_M0, BR_M1, BR_M2]
    directions: [-1, -1, 1]
    zero_position_indices: 2     # I want to move this to the motor parameters, but for now it's easier to keep it here since it's leg-specific
    zero_position_offset: 1
